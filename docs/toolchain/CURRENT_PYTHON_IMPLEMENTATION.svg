<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title description">
  <title id="title">Current SlopH Python-hosted Source v0 to native vertical slice</title>
  <desc id="description">The sloph console entry point runs a thin CLI and experimental compiler libraries on Python 3.11 or newer. Source v0 is parsed and elaborated through Core v0 to deterministic C11, which a host C compiler turns into a native executable. The implementation is not self-hosting and has no direct native object backend.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52606d"/>
    </marker>
    <style>
      .background { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #c9d2df; stroke-width: 2; }
      .hosted { fill: #eef6ff; stroke: #3984c6; stroke-width: 2; }
      .runtime { fill: #fff4df; stroke: #d99122; stroke-width: 2; }
      .absent { fill: #f6f7f9; stroke: #9aa6b2; stroke-width: 2; stroke-dasharray: 9 7; }
      .title { font: 700 36px ui-sans-serif, system-ui, sans-serif; fill: #152536; }
      .subtitle { font: 400 19px ui-sans-serif, system-ui, sans-serif; fill: #52606d; }
      .stage { font: 700 23px ui-sans-serif, system-ui, sans-serif; fill: #152536; }
      .label { font: 700 18px ui-sans-serif, system-ui, sans-serif; fill: #263746; }
      .small { font: 400 16px ui-sans-serif, system-ui, sans-serif; fill: #52606d; }
      .tiny { font: 400 14px ui-sans-serif, system-ui, sans-serif; fill: #52606d; }
      .mono { font: 600 17px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #152536; }
      .tline { fill: none; stroke: #263746; stroke-width: 5; stroke-linecap: round; }
      .arrow { fill: none; stroke: #52606d; stroke-width: 3; marker-end: url(#arrow); }
      .stop { fill: none; stroke: #b5473c; stroke-width: 3; stroke-dasharray: 10 8; }
      .stop-label { font: 700 16px ui-sans-serif, system-ui, sans-serif; fill: #9d352c; }
    </style>
  </defs>

  <rect class="background" width="1800" height="980"/>
  <text class="title" x="70" y="58">Current situation · Python-hosted Source v0 → native experiment</text>
  <text class="subtitle" x="70" y="91">A working vertical slice through C11; not yet the future self-hosting compiler</text>

  <g transform="translate(70 125)">
    <rect class="panel hosted" width="1660" height="220" rx="18"/>
    <text class="stage" x="28" y="39">Installed command path</text>

    <rect x="42" y="72" width="270" height="100" rx="12" fill="#ffffff" stroke="#3984c6" stroke-width="2"/>
    <text class="mono" text-anchor="middle" x="177" y="109">sloph unstable …</text>
    <text class="small" text-anchor="middle" x="177" y="140">console entry point</text>

    <path class="arrow" d="M 327 122 H 442"/>
    <rect x="457" y="72" width="290" height="100" rx="12" fill="#ffffff" stroke="#3984c6" stroke-width="2"/>
    <text class="mono" text-anchor="middle" x="602" y="109">sloph.cli:main</text>
    <text class="small" text-anchor="middle" x="602" y="140">thin argument and I/O adapter</text>

    <path class="arrow" d="M 762 122 H 877"/>
    <rect x="892" y="60" width="430" height="124" rx="12" fill="#ffffff" stroke="#3984c6" stroke-width="2"/>
    <text class="mono" text-anchor="middle" x="1107" y="96">syntax · project · core · backend</text>
    <text class="small" text-anchor="middle" x="1107" y="127">parse modules · elaborate and validate Core v0</text>
    <text class="small" text-anchor="middle" x="1107" y="153">evaluate or emit deterministic C11</text>

    <path class="arrow" d="M 1337 122 H 1452"/>
    <rect x="1467" y="72" width="155" height="100" rx="12" fill="#ffffff" stroke="#3984c6" stroke-width="2"/>
    <text class="label" text-anchor="middle" x="1544" y="104">result</text>
    <text class="tiny" text-anchor="middle" x="1544" y="130">Core / C11 /</text>
    <text class="tiny" text-anchor="middle" x="1544" y="150">native executable</text>
  </g>

  <g transform="translate(70 375)">
    <rect class="panel" width="1080" height="310" rx="18"/>
    <text class="stage" x="28" y="40">T-diagram of the implemented compiler stage</text>
    <text class="tiny" x="28" y="66">The Python compiler emits portable C11, not native objects directly</text>

    <path class="tline" d="M 80 174 H 1000 M 540 174 V 253"/>
    <text class="mono" text-anchor="middle" x="285" y="139">Source v0 project</text>
    <text class="small" text-anchor="middle" x="285" y="164">or first-order Core v0</text>

    <text class="mono" text-anchor="middle" x="790" y="139">C11 translation unit</text>
    <text class="small" text-anchor="middle" x="790" y="164">deterministic ASCII source</text>

    <text class="mono" text-anchor="middle" x="540" y="285">Python 3.11+</text>
  </g>

  <g transform="translate(1180 375)">
    <rect class="panel runtime" width="550" height="310" rx="18"/>
    <text class="stage" x="28" y="40">Hosted native handoff</text>
    <rect x="42" y="82" width="466" height="82" rx="12" fill="#ffffff" stroke="#d99122" stroke-width="2"/>
    <text class="label" text-anchor="middle" x="275" y="108">Python 3.11+ runs compiler</text>
    <text class="small" text-anchor="middle" x="275" y="136">host C11 compiler + linker</text>
    <path class="arrow" d="M 275 174 V 217"/>
    <rect x="110" y="228" width="330" height="52" rx="10" fill="#ffffff" stroke="#d99122" stroke-width="2"/>
    <text class="small" text-anchor="middle" x="275" y="252">Mach-O ARM64 or ELF x86-64</text>
    <text class="tiny" text-anchor="middle" x="275" y="271">experimental native executable</text>
  </g>

  <line class="stop" x1="70" y1="735" x2="1730" y2="735"/>
  <rect x="705" y="716" width="390" height="38" rx="19" fill="#f7f9fc"/>
  <text class="stop-label" text-anchor="middle" x="900" y="741">CURRENT IMPLEMENTATION STOPS HERE</text>

  <g transform="translate(70 790)">
    <rect class="absent" width="500" height="125" rx="16"/>
    <text class="label" text-anchor="middle" x="250" y="48">Experimental source profile</text>
    <text class="small" text-anchor="middle" x="250" y="79">first-order and fully annotated</text>
    <text class="tiny" text-anchor="middle" x="250" y="103">no effects, inference, generics, or I/O</text>

    <path class="arrow" d="M 585 62 H 655"/>
    <rect class="absent" x="670" width="460" height="125" rx="16"/>
    <text class="label" text-anchor="middle" x="900" y="48">C11 portability bridge</text>
    <text class="small" text-anchor="middle" x="900" y="79">host compiler and linker remain required</text>
    <text class="tiny" text-anchor="middle" x="900" y="103">no direct native object backend yet</text>

    <path class="arrow" d="M 1145 62 H 1215"/>
    <rect class="absent" x="1230" width="430" height="125" rx="16"/>
    <text class="label" text-anchor="middle" x="1445" y="48">No self-hosting compiler</text>
    <text class="small" text-anchor="middle" x="1445" y="79">no seed compiler or fixed point yet</text>
    <text class="tiny" text-anchor="middle" x="1445" y="103">Python remains the development host</text>
  </g>
</svg>
