name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --no-deps -e .
      - run: python -m unittest discover -s tests -t .
      - run: sloph unstable core check tests/core/evaluate/integer-add/input.core
      - run: sloph unstable core print tests/core/evaluate/integer-add/input.core
      - run: sloph unstable core eval tests/core/evaluate/integer-add/input.core --symbol example::main
