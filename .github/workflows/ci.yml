name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.context }}, ${{ matrix.python }})
    timeout-minutes: 10
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            context: ubuntu-latest
            arch: x86_64
            python: "3.11"
          - os: ubuntu-24.04
            context: ubuntu-latest
            arch: x86_64
            python: "3.13"
          - os: macos-15
            context: macos-latest
            arch: arm64
            python: "3.11"
          - os: macos-15
            context: macos-latest
            arch: arm64
            python: "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@v6
      - run: test "$(uname -m)" = "${{ matrix.arch }}"
      - name: Run unit, conformance, and example tests
        run: uv run --no-project --python "$(command -v python)" --directory src/sloph-python-bootstrap python -m unittest discover -s tests -t .
      - run: uv run --no-project --python "$(command -v python)" --directory src/sloph-python-bootstrap python -m sloph unstable core check ../../tests/core/evaluate/integer-add/input.core
      - run: uv run --no-project --python "$(command -v python)" --directory src/sloph-python-bootstrap python -m sloph unstable core print ../../tests/core/evaluate/integer-add/input.core
      - run: uv run --no-project --python "$(command -v python)" --directory src/sloph-python-bootstrap python -m sloph unstable core eval ../../tests/core/evaluate/integer-add/input.core --symbol example::main
      - run: uv run --no-project --python "$(command -v python)" --directory src/sloph-python-bootstrap python -m sloph unstable check ../../tests/source/run/basic/project
      - run: uv run --no-project --python "$(command -v python)" --directory src/sloph-python-bootstrap python -m sloph unstable run ../../tests/source/run/basic/project
