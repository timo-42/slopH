name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: C11 (${{ matrix.context }})
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            context: ubuntu-latest
            arch: x86_64
          - os: macos-15
            context: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify C11 toolchain
        run: |
          test "$(uname -m)" = "${{ matrix.arch }}"
          command -v cc
          command -v make
      - name: Clean offline build and full gate
        run: |
          make clean
          make CC=cc check
      - name: Sanitizers
        run: make CC=cc sanitize
      - name: Staged install smoke
        run: |
          make CC=cc install DESTDIR="$RUNNER_TEMP/stage" PREFIX=/usr
          "$RUNNER_TEMP/stage/usr/bin/sloph" --version
          SLOPH_LIBRARIES_ROOT="$RUNNER_TEMP/stage/usr/share/sloph/libraries" \
            "$RUNNER_TEMP/stage/usr/bin/sloph" run examples/hello-world
